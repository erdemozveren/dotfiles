[ids]

*

[main]
# Right Menu key code
compose = leftmeta
# Remap Caps Lock to activate a temporary layer while held (disables default toggle, keeps it always off initially)
capslock = layer(caps)
[caps]
# Remap WASD to arrow keys while Caps is held
w = up
a = left
s = down
d = right

# Caps + T toggles the actual Caps Lock state (on/off)
t = capslock

# Pass through T normally if you need it elsewhere, but overload to toggle
# (optional: if you want T to still type 't' after toggling, adjust as needed)

# Caps + I sends Shift + Insert
i = S-insert
# Caps + \ sends ~ (tilde, i.e., Shift + grave)
backslash = S-grave
